<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Vesak AR - GPS Edition</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v6.1.1/dist/aframe-extras.min.js"></script>
  </head>

  <body style="margin: 0px; overflow: hidden;">
    <a-scene 
      vr-mode-ui="enabled: false"
      embedded 
      arjs="sourceType: webcam; debugUIEnabled: false;"
      renderer="colorManagement: true; antialias: true; physicallyCorrectLights: true; exposure: 1.5;"
      gltf-model="dracoDecoderPath: https://www.gstatic.com/draco/v1/decoders/;"
    >
      
      <a-light type="ambient" intensity="2" color="#ffffff"></a-light>
      <a-light type="directional" position="2 4 2" intensity="1.5"></a-light>

      <a-entity
        id="vesak-lantern"
        gltf-model="url(./optimized_lantern.glb)" 
        gps-entity-place="latitude: 7.144012; longitude: 80.584507;"
        position="0 5 0"
        rotation="0 0 0"
        scale="15 15 15"
        animation="property: rotation; to: 0 360 0; loop: true; dur: 20000; easing: linear"
      >
        <a-light 
          type="point" 
          intensity="40" 
          distance="12" 
          position="0 0.5 0"
          animation="property: color; from: #ff0000; to: #0000ff; dur: 2000; dir: alternate; loop: true">
        </a-light>
      </a-entity>

      <a-camera gps-camera rotation-reader></a-camera>
    </a-scene>
  </body>
</html>
