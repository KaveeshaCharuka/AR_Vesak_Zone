<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Vesak AR - Test</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v6.1.1/dist/aframe-extras.min.js"></script>
  </head>

  <body style="margin: 0px; overflow: hidden;">
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
      
      <a-marker preset="hiro">
        <a-entity 
          rotation="-90 0 0" 
          position="0 1 0" 
          scale="10 10 10"
        >
          <a-entity
            id="vesak-lantern"
            gltf-model="url(./optimized_lantern.glb)" 
            animation="property: rotation; to: 0 0 360; loop: true; dur: 18000; easing: linear"
          >
            <a-light 
              type="point" 
              intensity="5" 
              distance="20" 
              animation="property: color; from: #ffcc00; to: #0088ff; dur: 4000; dir: alternate; loop: true">
            </a-light>
          </a-entity>
        </a-entity>
      </a-marker>

      <a-entity camera></a-entity>
    </a-scene>
  </body>
</html>
