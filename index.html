<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Vesak AR - Premium Edition</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v6.1.1/dist/aframe-extras.min.js"></script>
  </head>

  <body style="margin: 0px; overflow: hidden;">
    <a-scene 
      embedded 
      arjs="sourceType: webcam; debugUIEnabled: false;"
      renderer="colorManagement: true; exposure: 1; logarithmicDepthBuffer: true;"
      gltf-model="dracoDecoderPath: https://www.gstatic.com/draco/v1/decoders/;"
    >
      
      <a-light type="ambient" intensity="1.5" color="#ffffff"></a-light>
      
      <a-light type="directional" position="1 2 1" intensity="1" color="#ffffff"></a-light>

      <a-marker preset="hiro">
        <a-entity rotation="-90 0 0" position="0 0.5 0" scale="5 5 5">
          
          <a-entity
            id="vesak-lantern"
            gltf-model="url(./optimized_lantern.glb)" 
            animation="property: rotation; to: 0 0 360; loop: true; dur: 20000; easing: linear"
          >
            <a-light 
              type="point" 
              intensity="3" 
              distance="10" 
              animation="property: color; from: #ffcc00; to: #0088ff; dur: 5000; dir: alternate; loop: true">
            </a-light>
          </a-entity>

        </a-entity>
      </a-marker>

      <a-entity camera></a-entity>
    </a-scene>
  </body>
</html>
