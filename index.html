<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Vesak AR - Perfect Orientation</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v6.1.1/dist/aframe-extras.min.js"></script>
  </head>

  <body style="margin: 0px; overflow: hidden;">
    <a-scene 
      embedded 
      arjs="sourceType: webcam; debugUIEnabled: false;"
      renderer="colorManagement: true; exposure: 1.2;"
      gltf-model="dracoDecoderPath: https://www.gstatic.com/draco/v1/decoders/;"
    >
      
      <a-light type="ambient" intensity="1.2" color="#ffffff"></a-light>
      <a-light type="directional" position="1 2 1" intensity="0.8"></a-light>

      <a-marker preset="hiro">
        <a-entity id="anchor" rotation="0 0 0" position="0 0 0" scale="7 7 7">
          
          <a-entity
            id="vesak-lantern"
            gltf-model="url(./optimized_lantern.glb)" 
            rotation="0 0 0"
            animation="property: rotation; to: 0 360 0; loop: true; dur: 15000; easing: linear"
          >
            <a-light 
              type="point" 
              intensity="10" 
              distance="15" 
              position="0 1 0"
              animation="property: light.color; from: #ff0000; to: #0000ff; dur: 3000; dir: alternate; loop: true">
            </a-light>
          </a-entity>

        </a-entity>
      </a-marker>

      <a-entity camera></a-entity>
    </a-scene>
  </body>
</html>
